name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: pip

      - name: Install dependencies
        run: pip install pyfatfs

      - name: Install wokwi-cli
        run: curl -L https://wokwi.com/ci/install.sh | sh

      - name: Build firmware bundle
        run: ./emulator/setup.sh

      - name: Run emulator smoke test
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: ./emulator/test.sh

  release:
    name: Create Release
    needs: smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read
    env:
      VERSION: ""  # satisfies linter, is set dynamically from tag in first step
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "VERSION=$TAG" >> $GITHUB_ENV

      - name: Get CI workflow run ID
        id: get-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the successful CI workflow run for this commit
          RUN_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${{ github.sha }}&status=success&per_page=1" \
            --jq '.workflow_runs[0].id')
          
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::No successful CI run found for commit ${{ github.sha }}. Ensure CI passes before tagging."
            exit 1
          fi
          
          echo "RUN_ID=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Found CI run: $RUN_ID" >> $GITHUB_STEP_SUMMARY

      - name: Download all artifacts from CI
        uses: actions/download-artifact@v6
        with:
          github-token: ${{ github.token }}
          run-id: ${{ steps.get-run.outputs.RUN_ID }}
          path: ci-artifacts
          merge-multiple: true
          
      - name: Patch VERSION in firmware zip
        run: |
          ZIP_FILE=$(find ci-artifacts -name "midicaptain-firmware-*.zip" | head -1)
          # The CI artifact was built before the release tag existed, so its VERSION
          # file contains a git-describe string (e.g. v1.5.0-beta.2-11-g5fd6334).
          # Overwrite it with the actual release tag before publishing.
          (cd /tmp && echo "$VERSION" > VERSION && zip -u "$(realpath "$OLDPWD/$ZIP_FILE")" VERSION)
          echo "✓ Patched VERSION inside zip to: $VERSION" >> $GITHUB_STEP_SUMMARY

      - name: Prepare release assets
        run: |
          mkdir -p dist

          echo "Downloaded artifacts:"
          ls -la ci-artifacts/

          # Find and rename firmware zip
          ZIP_FILE=$(find ci-artifacts -name "midicaptain-firmware-*.zip" | head -1)
          if [ -n "$ZIP_FILE" ]; then
            cp "$ZIP_FILE" "dist/midicaptain-firmware-${VERSION}.zip"
            echo "✓ Firmware zip: midicaptain-firmware-${VERSION}.zip" >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::Firmware zip not found in CI artifacts"
            exit 1
          fi

          # Create "latest" zip for stable download URL (used by Gumroad)
          cp "dist/midicaptain-firmware-${VERSION}.zip" "dist/midi-captain-max-latest.zip"
          echo "✓ Latest zip: midi-captain-max-latest.zip" >> $GITHUB_STEP_SUMMARY
          
          # Find and rename config editor DMG
          DMG_FILE=$(find ci-artifacts -name "*.dmg" | head -1)
          if [ -n "$DMG_FILE" ]; then
            cp "$DMG_FILE" "dist/MIDI-Captain-MAX-Config-Editor-${VERSION}.dmg"
            echo "✓ Config Editor DMG: MIDI-Captain-MAX-Config-Editor-${VERSION}.dmg" >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::Config Editor DMG not found in CI artifacts"
          fi
          
          # Find and rename config editor MSI (Windows)
          MSI_FILE=$(find ci-artifacts -name "*.msi" | head -1)
          if [ -n "$MSI_FILE" ]; then
            cp "$MSI_FILE" "dist/MIDI-Captain-MAX-Config-Editor-${VERSION}.msi"
            echo "✓ Config Editor MSI: MIDI-Captain-MAX-Config-Editor-${VERSION}.msi" >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::Config Editor MSI not found in CI artifacts"
          fi
          
          # Find and rename config editor NSIS installer (Windows)
          # Tauri generates filename from productName: "MIDI Captain MAX Config Editor"
          # Pattern is resilient to filename variations
          NSIS_FILE=$(find ci-artifacts -name "*-setup.exe" | grep -i "config-editor\|captain" | head -1)
          if [ -n "$NSIS_FILE" ]; then
            cp "$NSIS_FILE" "dist/MIDI-Captain-MAX-Config-Editor-${VERSION}-setup.exe"
            echo "✓ Config Editor NSIS: MIDI-Captain-MAX-Config-Editor-${VERSION}-setup.exe" >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::Config Editor NSIS installer not found in CI artifacts"
          fi
          
          ls -la dist/

      - name: Generate Release Note Header
        id: header
        run: |
          echo "PRERELEASE=false" >> $GITHUB_OUTPUT # default to 'latest' for now
          if [[ "$VERSION" == *"alpha"* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "NOTES=⚠️ **Alpha Release** - For testing only. Not recommended for production use." >> $GITHUB_ENV
          elif [[ "$VERSION" == *"beta"* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "NOTES=🧪 **Beta Release** - Feature complete, undergoing final testing." >> $GITHUB_ENV
          elif [[ "$VERSION" == *"rc"* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "NOTES=🚀 **Release Candidate** - Final testing before stable release." >> $GITHUB_ENV
          else
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "NOTES=✅ **Stable Release**" >> $GITHUB_ENV
          fi

      - name: Generate Release Notes Body
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Generate the "What's Changed" changelog via the API so we control placement
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CHANGELOG=""
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$VERSION" \
              -f previous_tag_name="$PREV_TAG" \
              --jq '.body' 2>/dev/null || echo "")
          fi

          # Build final body: header + changelog + installation instructions
          envsubst < tools/release_notes.md > release_notes_processed.txt
          {
            echo "BODY<<RELEASE_BODY_EOF"
            head -1 release_notes_processed.txt
            echo ""
            if [ -n "$CHANGELOG" ]; then
              echo "$CHANGELOG"
              echo ""
            fi
            # Append everything after the first line (installation instructions)
            tail -n +2 release_notes_processed.txt
            echo ""
            echo "RELEASE_BODY_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          prerelease:  ${{ steps.header.outputs.PRERELEASE }}
          make_latest: ${{ steps.header.outputs.PRERELEASE != 'true' }}
          files: dist/*
          body: ${{ steps.notes.outputs.BODY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print Release
        run: |
          { 
            echo "Release \`$VERSION\` created successfully!"
            echo ""
            echo "Release URL: ${{ steps.create_release.outputs.url }}"
          } >> $GITHUB_STEP_SUMMARY

