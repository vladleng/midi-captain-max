# Wokwi automation scenario: verify firmware boots and loads config
# Run with: wokwi-cli --scenario emulator/test-boot.yaml
steps:
  # Wait for firmware boot banner
  - wait-serial: "MIDI CAPTAIN"
  # Wait for device detection
  - wait-serial: "STD10"
  # Press button 1 (btn1 on GP1)
  - set-control:
      part-id: btn1
      control: pressed
      value: 1
  - delay: 200ms
  - set-control:
      part-id: btn1
      control: pressed
      value: 0
  - delay: 500ms
  # Press button 6 (btn6 on GP9)
  - set-control:
      part-id: btn6
      control: pressed
      value: 1
  - delay: 200ms
  - set-control:
      part-id: btn6
      control: pressed
      value: 0
  - delay: 500ms
